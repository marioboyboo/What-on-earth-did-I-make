<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sprite Evolver</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f0f0;
            overflow: hidden;
            cursor: pointer;
            user-select: none;
        }

        #character {
            position: absolute;
            /* Adjust width/height or leave auto depending on your sprite sizes */
            max-width: 80vw;
            max-height: 80vh;
            transition: transform 0.1s ease-out;
            pointer-events: none; /* Clicks go to the body */
        }

        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #333;
            border-radius: 2px;
            pointer-events: none;
        }

        @keyframes fallIn {
            0% { transform: translateY(-500px) scale(0.5); opacity: 0; }
            60% { transform: translateY(20px) scale(1.1); opacity: 1; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        .baby-falling {
            animation: fallIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
    </style>
</head>
<body>

    <img id="character" src="size1.png" alt="Stickman">

<script>
    const charImg = document.getElementById('character');
    let currentSize = 1;
    const maxSize = 9;

    // Preload images to prevent flickering
    for (let i = 1; i <= maxSize; i++) {
        const img = new Image();
        img.src = `size${i}.png`;
    }

    function createExplosion(x, y) {
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            document.body.appendChild(particle);

            const angle = Math.random() * Math.PI * 2;
            const velocity = 5 + Math.random() * 10;
            const destX = Math.cos(angle) * velocity * 20;
            const destY = Math.sin(angle) * velocity * 20;

            particle.style.left = x + 'px';
            particle.style.top = y + 'px';
            // Randomize particle color for variety
            particle.style.backgroundColor = Math.random() > 0.5 ? '#000' : '#555';

            const animation = particle.animate([
                { transform: 'translate(0, 0) rotate(0deg)', opacity: 1 },
                { transform: `translate(${destX}px, ${destY}px) rotate(360deg)`, opacity: 0 }
            ], {
                duration: 600,
                easing: 'ease-out'
            });

            animation.onfinish = () => particle.remove();
        }
    }

    function spawnBaby() {
        currentSize = 1;
        charImg.src = `size1.png`;
        charImg.style.display = 'block';
        charImg.classList.add('baby-falling');
        
        setTimeout(() => {
            charImg.classList.remove('baby-falling');
        }, 500);
    }

    window.addEventListener('click', (e) => {
        // Prevent clicking during the "new baby" animation
        if (charImg.classList.contains('baby-falling')) return;

        if (currentSize < maxSize) {
            currentSize++;
            charImg.src = `size${currentSize}.png`;
            
            // Adding a little "jiggle" on growth
            charImg.style.transform = 'scale(1.1)';
            setTimeout(() => charImg.style.transform = 'scale(1)', 100);
            
        } else {
            // EXPLODE!
            const rect = charImg.getBoundingClientRect();
            createExplosion(rect.left + rect.width / 2, rect.top + rect.height / 2);
            
            charImg.style.display = 'none';
            
            // Wait slightly before the new baby falls in
            setTimeout(spawnBaby, 400);
        }
    });
</script>
</body>
</html>
